<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刻の標 | TOKI NO SHIRUBE</title>
    <meta name="description" content="高級ヴィラ 刻の標" />
    <link rel="stylesheet" href="./assets/css/lib/swiper-bundle.min.css?v=1.1.0" />
    <link rel="stylesheet" href="./assets/css/style.css?v=1.1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400..500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body id="top">
    <header class="l-header p-header">
      <div class="l-header__inner">
        <nav class="p-header__nav p-header__left" aria-label="メインナビゲーション（左）">
          <ul class="p-header__nav-list">
            <li><a href="#about">刻の標について</a></li>
            <li><a href="#villa">ヴィラ</a></li>
            <li><a href="#dining">お食事</a></li>
            <li><a href="#surroundings">周辺環境</a></li>
          </ul>
        </nav>
        <h1 class="l-header__logo">
          <a href="#" class="p-header__logo">
            <img
              src="./assets/img/logo.webp"
              alt="刻の標"
              width="172"
              height="286"
              decoding="async"
            />
          </a>
        </h1>
        <div class="p-header__right">
          <nav class="p-header__nav p-header__nav--right" aria-label="メインナビゲーション（右）">
            <ul class="p-header__nav-list">
              <li><a href="#access">アクセス</a></li>
              <li><a href="#faq">よくある質問</a></li>
              <li><a href="#contact">お問い合わせ</a></li>
            </ul>
          </nav>
          <a href="#" class="p-header__cta" target="_blank" rel="noopener noreferrer">
            <span>予約はこちら</span>
            <svg
              class="p-header__cta-icon"
              width="14"
              height="14"
              viewBox="0 0 14 14"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M9.5 1.5H12.5V4.5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="square"
              />
              <path
                d="M5.5 8.5L12 2"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="square"
              />
              <path
                d="M10.5 7.5V12.5H1.5V3.5H6.5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="square"
                stroke-linejoin="miter"
              />
            </svg>
          </a>
        </div>
      </div>
    </header>
    <main class="l-main">
      <div class="p-fv">
        <div class="p-fv__image">
          <picture>
            <source srcset="./assets/img/fv-pc.webp" media="(min-width: 1100px)" />
            <img
              src="./assets/img/fv-sp.webp"
              alt="fv画像"
              width="1920"
              height="860"
              decoding="async"
            />
          </picture>
        </div>
      </div>
    </main>
  </body>
</html>
